server:
  port: 8085

spring:
  application:
    name: billing-service

  # Config Server — set to optional so startup does NOT fail if Config Server is not running
  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: jdbc:mysql://localhost:3306/billing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Eureka — set enabled=false so startup does NOT fail if Eureka is not running
eureka:
  client:
    enabled: true    # ← restore to true before final integration
    register-with-eureka: true   # ← restore to true before final integration
    fetch-registry: true   # ← restore to true before final integration
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT secret — must match the secret used by User Service (P1)
jwt:
  secret: thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab

# Feign client timeouts + standalone URL overrides
# When running without Eureka, Feign uses these URLs directly
# instead of trying to resolve via load balancer
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.medlab.billing.controller
  paths-to-match: /**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.medlab.billing: DEBUG
    org.springframework.security: INFO
    feign: DEBUG