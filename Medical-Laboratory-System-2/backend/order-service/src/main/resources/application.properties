spring.application.name=order-service
server.port=8082

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/medlab?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT secret
# FIX: was "my-secret-key-my-secret-key-my-secret-key" (wrong/unused since JwtUtil
# uses a hardcoded value, but corrected here for consistency and future @Value migration)
# ===============================
jwt.secret=thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab

# ===============================
# Eureka Client
# FIX: was disabled (eureka.client.enabled=false) ? enabled for integration
# ===============================
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# Config Server (optional ? won't fail if not running)
# ===============================
spring.config.import=optional:configserver:http://localhost:8888

spring.sql.init.mode=never