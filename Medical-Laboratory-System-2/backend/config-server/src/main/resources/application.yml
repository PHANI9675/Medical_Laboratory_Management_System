server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        # Native profile — reads config files from local classpath/filesystem
        # Switch to 'git' backend for production by replacing this block with:
        #   git:
        #     uri: https://github.com/your-org/medlab-config-repo
        #     default-label: main
        native:
          search-locations: classpath:/config

  profiles:
    active: native

# Eureka — config server registers itself so services can discover it by name
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, env, refresh
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.medlab.config: DEBUG
    org.springframework.cloud.config: INFO