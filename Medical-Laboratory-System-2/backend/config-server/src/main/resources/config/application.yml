# ============================================================
# SHARED CONFIG — applied to every service that pulls from
# Config Server. Individual service files below override
# anything here on a per-service basis.
# ============================================================

# JWT secret — single source of truth for all services
jwt:
  secret: thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab

# Eureka — all services point to same registry
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator — expose health for all services
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# Common JPA settings
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true