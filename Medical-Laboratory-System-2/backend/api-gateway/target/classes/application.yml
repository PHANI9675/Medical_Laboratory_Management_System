server:
  port: 8090

spring:
  application:
    name: api-gateway

  config:
    import: "optional:configserver:http://localhost:8888"

  cloud:
    gateway:

      # Discovery locator disabled -- all routes are defined explicitly below.
      # Enabling it alongside explicit routes caused ordering conflicts in
      # Spring Cloud Gateway 4.x (2025.1.x) where auto-routes interfered with
      # manual route evaluation, resulting in 404 for valid paths like /auth/**.
      discovery:
        locator:
          enabled: false

      # Ensures "no service instance found" returns 503 (not 404).
      # Without this, lb:// resolution failures are indistinguishable from
      # "no route matched", making them hard to diagnose.
      loadbalancer:
        use404: false

      routes:

        # -- Auth Service (user-service) ------------------------------------
        # /patient/profile and /patient/reports are intentionally listed here
        # because auth-service has its own PatientController for those two
        # paths. All other /patient/** routes go to patient-service below.
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**,/admin/**,/labTech/**,/patient/profile,/patient/reports

        # -- Patient Service ------------------------------------------------
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/patient/**

        # -- Order Service --------------------------------------------------
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**

        # -- Lab Processing Service (LPS) -----------------------------------
        - id: lps
          uri: lb://lps
          predicates:
            - Path=/api/jobs/**

        # -- Inventory Service ----------------------------------------------
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/tests/**,/inventory/**

        # -- Billing Service ------------------------------------------------
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/billing/**,/invoices/**,/payments/**

        # -- Notification Service -------------------------------------------
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**

        # -- Swagger / API-docs aggregation ---------------------------------
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - SetPath=/v3/api-docs

        - id: patient-service-docs
          uri: lb://patient-service
          predicates:
            - Path=/v3/api-docs/patient-service
          filters:
            - SetPath=/v3/api-docs

        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - SetPath=/v3/api-docs

        - id: lps-docs
          uri: lb://lps
          predicates:
            - Path=/v3/api-docs/lps
          filters:
            - SetPath=/v3/api-docs

        - id: inventory-service-docs
          uri: lb://inventory-service
          predicates:
            - Path=/v3/api-docs/inventory-service
          filters:
            - SetPath=/v3/api-docs

        - id: billing-service-docs
          uri: lb://billing-service
          predicates:
            - Path=/v3/api-docs/billing-service
          filters:
            - SetPath=/v3/api-docs

        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - SetPath=/v3/api-docs

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# JWT secret -- must match all other services
jwt:
  secret: thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab

# SpringDoc -- aggregated Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/user-service
      - name: Patient Service
        url: /v3/api-docs/patient-service
      - name: Order Service
        url: /v3/api-docs/order-service
      - name: Lab Processing Service
        url: /v3/api-docs/lps
      - name: Inventory Service
        url: /v3/api-docs/inventory-service
      - name: Billing Service
        url: /v3/api-docs/billing-service
      - name: Notification Service
        url: /v3/api-docs/notification-service
  api-docs:
    path: /v3/api-docs

# Actuator
# NOTE: management.endpoints.web.exposure.include is also set in the config-server's
# global application.yml (health,info,metrics). Because config-server properties override
# local ones, we override back via config-server/config/api-gateway.yml which has
# even higher priority. This local block acts as a fallback when config-server is down.
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging -- DEBUG for gateway routing decisions; helps diagnose any future 404s
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.medlab.gateway: DEBUG
