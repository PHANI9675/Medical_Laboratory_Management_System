# =========================================
# Application
# FIX: port changed from 8082 ? 8083 (8082 is reserved for order-service per plan)
# =========================================
spring.application.name=lps
server.port=8083

# =========================================
# MySQL Datasource
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/lab_processing?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =========================================
# Connection Pool (Hikari)
# =========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=LabProcessingHikariCP

# =========================================
# Swagger / OpenAPI
# =========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# =========================================
# Logging
# =========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================
# JWT
# =========================================
jwt.secret=thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab
jwt.expiration=3600000

# =========================================
# Eureka Client
# FIX: added trailing slash to defaultZone (missing previously)
# FIX: added prefer-ip-address
# =========================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =========================================
# Config Server (optional ? won't fail if not running)
# =========================================
spring.config.import=optional:configserver:http://localhost:8888